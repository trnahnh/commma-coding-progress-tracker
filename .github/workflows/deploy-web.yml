name: Deploy Web

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api.commma.dev' }}
        run: pnpm --filter @commma/web build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Sync hashed assets
        run: >
          aws s3 sync apps/web/dist s3://${{ vars.WEB_S3_BUCKET }}
          --delete
          --exclude index.html
          --cache-control "public,max-age=31536000,immutable"

      - name: Upload index.html
        run: >
          aws s3 cp apps/web/dist/index.html s3://${{ vars.WEB_S3_BUCKET }}/index.html
          --cache-control "no-cache"

      - name: Invalidate CloudFront
        run: >
          aws cloudfront create-invalidation
          --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
          --paths "/*"
