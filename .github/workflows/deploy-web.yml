name: Deploy Web

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-web.yml'

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api.commma.dev' }}
        run: pnpm --filter @commma/web build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Sync hashed assets
        run: >
          aws s3 sync apps/web/dist s3://${{ vars.WEB_S3_BUCKET }}
          --delete
          --exclude index.html
          --cache-control "public,max-age=31536000,immutable"

      - name: Upload index.html
        run: >
          aws s3 cp apps/web/dist/index.html s3://${{ vars.WEB_S3_BUCKET }}/index.html
          --cache-control "no-cache"

      - name: Invalidate CloudFront
        run: >
          aws cloudfront create-invalidation
          --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
          --paths "/*"

      - name: Smoke check
        env:
          WEB_URL: ${{ vars.WEB_URL || 'https://commma.dev' }}
        run: |
          for i in $(seq 1 15); do
            code=$(curl -fsS -o /dev/null -w "%{http_code}" "$WEB_URL" || true)
            if [ "$code" = "200" ]; then
              echo "web reachable ($code)"
              exit 0
            fi
            echo "attempt $i: got '$code', retrying"
            sleep 4
          done
          echo "smoke check failed: $WEB_URL did not return 200"
          exit 1
