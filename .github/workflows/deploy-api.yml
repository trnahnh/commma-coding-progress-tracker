name: Deploy API

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/db/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-api.yml'

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build API
        run: pnpm --filter @commma/api build

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/commma
            git pull origin main
            pnpm install --frozen-lockfile
            pnpm --filter @commma/api build
            pm2 restart commma-api --update-env
            pm2 save
            for i in $(seq 1 15); do
              if curl -fsS http://127.0.0.1:3000/health >/dev/null; then
                echo "health ok"
                exit 0
              fi
              sleep 2
            done
            echo "health check failed after restart"
            pm2 logs commma-api --lines 50 --nostream || true
            exit 1
