stages:
  - status
  - check
  - deploy
  - status-final

variables:
  VITE_API_BASE_URL: "https://api.commma.dev"
  WEB_S3_BUCKET: "commma-web"
  CLOUDFRONT_DISTRIBUTION_ID: "E20DGG72SOB2P0"
  API_HOST: "ec2-user@api.commma.dev"
  APP_DIR: "/home/ec2-user/commma"
  GITHUB_REPO: "trnahnh/commma-coding-progress-tracker"
  GITHUB_STATUS_CONTEXT: "gitlab/ci"

.github-status:
  image: curlimages/curl:8.11.1
  variables:
    GIT_STRATEGY: none
  before_script:
    - |
      post_status() {
        curl --fail --silent --show-error \
          -X POST \
          -H "Authorization: Bearer ${GITHUB_STATUS_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/${GITHUB_REPO}/statuses/${CI_COMMIT_SHA}" \
          -d "{\"state\":\"$1\",\"context\":\"${GITHUB_STATUS_CONTEXT}\",\"target_url\":\"${CI_PIPELINE_URL}\",\"description\":\"$2\"}"
      }

github-status:pending:
  extends: .github-status
  stage: status
  rules:
    - if: $GITHUB_STATUS_TOKEN && $CI_COMMIT_BRANCH == "main"
  script:
    - post_status pending "GitLab pipeline running"

github-status:success:
  extends: .github-status
  stage: status-final
  rules:
    - if: $GITHUB_STATUS_TOKEN && $CI_COMMIT_BRANCH == "main"
      when: on_success
  script:
    - post_status success "GitLab pipeline passed"

github-status:failure:
  extends: .github-status
  stage: status-final
  rules:
    - if: $GITHUB_STATUS_TOKEN && $CI_COMMIT_BRANCH == "main"
      when: on_failure
  script:
    - post_status failure "GitLab pipeline failed"

.pnpm:
  image: node:22-bookworm-slim
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.28.1 --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile

lint:
  extends: .pnpm
  stage: check
  script:
    - pnpm lint

typecheck:
  extends: .pnpm
  stage: check
  script:
    - pnpm typecheck

test:
  extends: .pnpm
  stage: check
  script:
    - pnpm test

deploy:web:
  extends: .pnpm
  stage: deploy
  resource_group: production-web
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.28.1 --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile
    - apt-get update && apt-get install -y --no-install-recommends awscli && rm -rf /var/lib/apt/lists/*
  script:
    - bash infra/deploy-web.sh
  environment:
    name: production/web
    url: https://commma.dev
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - apps/web/**/*
        - packages/shared/**/*
        - pnpm-lock.yaml
        - .gitlab-ci.yml

deploy:api:
  stage: deploy
  image: node:22-bookworm-slim
  resource_group: production-api
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends openssh-client && rm -rf /var/lib/apt/lists/*
  script:
    - install -m 600 "$SSH_PRIVATE_KEY" /tmp/commma-api.pem
    - SSH_KEY=/tmp/commma-api.pem bash infra/deploy-api.sh
  environment:
    name: production/api
    url: https://api.commma.dev
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - apps/api/**/*
        - packages/db/**/*
        - packages/shared/**/*
        - pnpm-lock.yaml
        - .gitlab-ci.yml

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
