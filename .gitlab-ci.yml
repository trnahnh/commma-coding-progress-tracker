stages:
  - check
  - deploy

variables:
  VITE_API_BASE_URL: "https://api.commma.dev"
  WEB_S3_BUCKET: "commma-web"
  CLOUDFRONT_DISTRIBUTION_ID: "E20DGG72SOB2P0"
  API_HOST: "ec2-user@api.commma.dev"
  APP_DIR: "/home/ec2-user/commma"

.pnpm:
  image: node:22-bookworm-slim
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.28.1 --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile

lint:
  extends: .pnpm
  stage: check
  script:
    - pnpm lint

typecheck:
  extends: .pnpm
  stage: check
  script:
    - pnpm typecheck

test:
  extends: .pnpm
  stage: check
  script:
    - pnpm test

deploy:web:
  extends: .pnpm
  stage: deploy
  resource_group: production-web
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.28.1 --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile
    - apt-get update && apt-get install -y --no-install-recommends awscli && rm -rf /var/lib/apt/lists/*
  script:
    - bash infra/deploy-web.sh
  environment:
    name: production/web
    url: https://commma.dev
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - apps/web/**/*
        - packages/shared/**/*
        - pnpm-lock.yaml
        - .gitlab-ci.yml

deploy:api:
  stage: deploy
  image: node:22-bookworm-slim
  resource_group: production-api
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends openssh-client && rm -rf /var/lib/apt/lists/*
  script:
    - install -m 600 "$SSH_PRIVATE_KEY" /tmp/commma-api.pem
    - SSH_KEY=/tmp/commma-api.pem bash infra/deploy-api.sh
  environment:
    name: production/api
    url: https://api.commma.dev
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - apps/api/**/*
        - packages/db/**/*
        - packages/shared/**/*
        - pnpm-lock.yaml
        - .gitlab-ci.yml

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
